name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::pkgdown

      - name: Install tutorial dependencies
        run: install.packages(c("ggplot2", "dplyr", "tibble", "tidyr"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Install grazer package
        run: R CMD INSTALL . --no-multiarch --no-test-load

      - name: Build pkgdown site
        run: |
          stopifnot(requireNamespace("pkgdown", quietly = TRUE))
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
